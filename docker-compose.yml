services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal_universitario_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - portal_network

  web:
    image: nginx:alpine
    container_name: portal_universitario_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - portal_network

  db:
    image: mariadb:10.11
    container_name: portal_universitario_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: portal_universitario
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: portal_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - portal_dbdata:/var/lib/mysql
    networks:
      - portal_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: portal_universitario_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - portal_network

volumes:
  portal_dbdata:

networks:
  portal_network: